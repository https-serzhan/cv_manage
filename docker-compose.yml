services:
  postgres:
    image: postgres:16-alpine
    container_name: cv-management-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cv_management
      POSTGRES_USER: cv_management
      POSTGRES_PASSWORD: cv_management_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cv_management -d cv_management"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
